name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  COMPOSE_PROJECT: nex-payroll
  DB_CONTAINER: nex-payroll-db
  POSTGRES_USER: nex_payroll
  POSTGRES_DB: nex_payroll
  POSTGRES_TEST_DB: nex_payroll_test
  DATABASE_URL: postgresql+pg8000://nex_payroll:changeme@localhost:9174/nex_payroll
  TEST_DATABASE_URL: postgresql+pg8000://nex_payroll:changeme@localhost:9174/nex_payroll_test

jobs:
  lint:
    name: Backend Lint
    runs-on: [self-hosted, linux, andros]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: backend
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          pip install --break-system-packages poetry
          poetry install --no-interaction --no-root

      - name: Run ruff check
        working-directory: backend
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run ruff check .

      - name: Run ruff format check
        working-directory: backend
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run ruff format --check .

  test:
    name: Backend Test
    runs-on: [self-hosted, linux, andros]
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: backend
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          pip install --break-system-packages poetry
          poetry install --no-interaction --no-root

      - name: Wait for database
        working-directory: backend
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run python scripts/wait_for_db.py

      - name: Recreate test database (clean state for migrations)
        run: |
          docker exec ${{ env.DB_CONTAINER }} psql -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} \
            -c "DROP DATABASE IF EXISTS ${{ env.POSTGRES_TEST_DB }};"
          docker exec ${{ env.DB_CONTAINER }} psql -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} \
            -c "CREATE DATABASE ${{ env.POSTGRES_TEST_DB }} OWNER ${{ env.POSTGRES_USER }};"

      - name: Run Alembic migrations on test DB
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run alembic upgrade head

      - name: Run tests with coverage
        working-directory: backend
        env:
          TEST_DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run pytest -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=90

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: [self-hosted, linux, andros]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: ESLint check
        working-directory: frontend
        run: npx eslint . || true

  frontend-test:
    name: Frontend Test
    runs-on: [self-hosted, linux, andros]
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npx vitest run

  frontend-build:
    name: Frontend Build
    runs-on: [self-hosted, linux, andros]
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build:
    name: Build Docker Images
    runs-on: [self-hosted, linux, andros]
    needs: [test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build -t nex-payroll-backend:${{ github.sha }} ./backend
          docker tag nex-payroll-backend:${{ github.sha }} nex-payroll-backend:latest

      - name: Build frontend Docker image
        run: |
          docker build -t nex-payroll-frontend:${{ github.sha }} ./frontend
          docker tag nex-payroll-frontend:${{ github.sha }} nex-payroll-frontend:latest

      - name: Verify backend Docker image
        run: docker run --rm nex-payroll-backend:latest python -c "import app; print('OK')"

  deploy:
    name: Deploy
    runs-on: [self-hosted, linux, andros]
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install backend dependencies
        working-directory: backend
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          pip install --break-system-packages poetry
          poetry install --no-interaction --no-root

      - name: Wait for database
        working-directory: backend
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run python scripts/wait_for_db.py

      - name: Run Alembic migrations
        working-directory: backend
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          poetry run alembic upgrade head

      - name: Deploy with Docker Compose
        run: |
          cd /opt/nex-payroll-src
          git pull origin main
          # Force-remove any containers with mismatched compose project labels
          docker rm -f nex-payroll-frontend nex-payroll-backend 2>/dev/null || true
          docker compose up -d --build --remove-orphans

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9172/health > /dev/null 2>&1; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          echo "Backend failed to become healthy"
          docker compose -p ${{ env.COMPOSE_PROJECT }} -f /opt/nex-payroll-src/docker-compose.yml logs backend --tail=50
          exit 1
