name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run ruff
        working-directory: backend
        run: poetry run ruff check .

  test:
    name: Test
    runs-on: self-hosted
    needs: lint
    env:
      DATABASE_URL: postgresql+pg8000://nex_payroll:changeme@localhost:9174/nex_payroll
      TEST_DATABASE_URL: postgresql+pg8000://nex_payroll:changeme@localhost:9174/nex_payroll_test
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Ensure test database exists
        run: |
          docker exec nex-payroll-db psql -U nex_payroll -d nex_payroll -tc \
            "SELECT 1 FROM pg_database WHERE datname = 'nex_payroll_test'" \
            | grep -q 1 \
            || docker exec nex-payroll-db psql -U nex_payroll -d nex_payroll \
              -c "CREATE DATABASE nex_payroll_test OWNER nex_payroll;"

      - name: Run tests
        working-directory: backend
        run: poetry run pytest -v

  build:
    name: Build Docker Image
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build -t nex-payroll-backend:${{ github.sha }} ./backend
          docker tag nex-payroll-backend:${{ github.sha }} nex-payroll-backend:latest

      - name: Verify backend Docker image
        run: docker run --rm nex-payroll-backend:latest python --version
