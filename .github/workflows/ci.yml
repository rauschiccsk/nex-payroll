name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and run ruff
        run: |
          python -m venv .venv-lint
          .venv-lint/bin/pip install ruff
          .venv-lint/bin/ruff check .

  test:
    name: Test
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install poetry
          .venv/bin/poetry config virtualenvs.create false
          .venv/bin/poetry install --no-interaction

      - name: Run tests
        run: .venv/bin/pytest -v

  build:
    name: Build Docker Image
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t nex-payroll:${{ github.sha }} .
          docker tag nex-payroll:${{ github.sha }} nex-payroll:latest

      - name: Test Docker image
        run: |
          docker run --rm nex-payroll:latest python --version
