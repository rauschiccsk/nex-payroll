services:
  db:
    image: postgres:16-alpine
    container_name: nex-payroll-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nex-payroll-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PAYROLL_ENCRYPTION_KEY: ${PAYROLL_ENCRYPTION_KEY}
      PAYROLL_JWT_SECRET: ${PAYROLL_JWT_SECRET}
      OLLAMA_URL: ${OLLAMA_URL}
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nex-payroll-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
