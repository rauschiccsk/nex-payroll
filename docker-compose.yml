services:
  db:
    image: postgres:16-alpine
    container_name: nex-payroll-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nex_payroll}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-nex_payroll}
    ports:
      - "${POSTGRES_PORT:-9174}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nex_payroll}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nex-payroll-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+pg8000://${POSTGRES_USER:-nex_payroll}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-nex_payroll}
      TEST_DATABASE_URL: postgresql+pg8000://${POSTGRES_USER:-nex_payroll}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_TEST_DB:-nex_payroll_test}
      SECRET_KEY: ${SECRET_KEY:-changeme-generate-a-real-secret-key}
    ports:
      - "${BACKEND_PORT:-9172}:9172"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9172/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nex-payroll-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-9173}:9173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9173/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
