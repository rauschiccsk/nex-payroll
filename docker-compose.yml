services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "9174:5432"
    environment:
      POSTGRES_USER: payroll
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payroll_dev}
      POSTGRES_DB: payroll
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payroll -d payroll"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9172:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://payroll:payroll_dev@db:5432/payroll}
      PAYROLL_ENCRYPTION_KEY: ${PAYROLL_ENCRYPTION_KEY}
      PAYROLL_JWT_SECRET: ${PAYROLL_JWT_SECRET}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9173:80"
    depends_on:
      - app

volumes:
  pgdata:
